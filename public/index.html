<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7P3JK2357E"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-7P3JK2357E');
    </script>
    <script>var whTooltips = { colorLinks: true, iconizeLinks: false, renameLinks: true, domain: 'tbc', hide: { icon: true } };</script>
    <script src="https://wow.zamimg.com/widgets/power.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="TBC Duck Analyzer - Professional tool to analyze World of Warcraft TBC logs. Check performance, buffs, enchants and more.">
    <meta name="keywords" content="WoW, TBC, Burning Crusade, analyzer, warcraft logs, audit">
    <meta name="author" content="TBC Duck Analyzer">
    <meta property="og:title" content="TBC Duck Analyzer - WoW TBC Log Analyzer">
    <meta property="og:description" content="Detailed analysis of World of Warcraft TBC combat logs">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#f4b400">
    <title>TBC Duck Analyzer - WoW TBC Log Analyzer</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" type="image/x-icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' font-family='Arial'>🦆</text></svg>">
</head>

<body>

    <!-- ==================== LANDING PAGE ==================== -->
    <div id="landingPage" class="landing-page">
        <div class="landing-content">
            <div class="logo-container">
                <h1>TBC DUCK ANALYZER</h1>
            </div>
            <div class="top-bar">
                <input type="text" id="logInput" placeholder="Paste log URL or ID here..." autocomplete="off"
                    spellcheck="false" data-lpignore="true">
                <button onclick="auditarLog()" class="audit-btn">LOG CHECK</button>
            </div>
            <div class="bypass-cache-container">
                <label class="bypass-cache-label">
                    <input type="checkbox" id="bypassCacheInput">
                    <span>Force Refresh (Bypass Cache)</span>
                </label>
            </div>
            <div id="landingStatus" class="landing-status"></div>
        </div>
        <footer class="landing-footer">
            <p>TBC Duck Analyzer v1.2 &copy; 2026</p>
            <p class="footer-sub">WoW TBC Log Analyzer | Made for the community</p>
            <div class="landing-footer-links">
                <a href="#" id="landingFeedbackBtn" class="landing-footer-link"><span>📝</span> Feedback</a>
                <a href="#" id="landingGithubBtn" class="landing-footer-link"><span>⭐</span> GitHub</a>
            </div>
        </footer>
    </div>

    <!-- ==================== APP LAYOUT (hidden initially) ==================== -->
    <div id="appLayout" class="app-layout">

        <!-- LEFT SIDEBAR — FIGHTS -->
        <aside class="sidebar sidebar-left" id="sidebarLeft">
            <div class="sidebar-header">
                <div class="sidebar-logo">🦆 TBC Duck Analyzer</div>
                <div class="sidebar-report-id" id="reportInfo"></div>
                <a href="#" class="sidebar-back" onclick="goBackToLanding(); return false;">← Change report</a>
            </div>
            <div class="sidebar-divider"></div>
            <div class="sidebar-section" style="flex: 1; display: flex; flex-direction: column;">
                <div class="sidebar-section-title">FIGHTS</div>
                <div id="fightsList" class="sidebar-list" style="flex: 1;"></div>
            </div>

            <!-- SIDEBAR FOOTER FOR BUTTONS -->
            <div class="sidebar-footer">
                <button id="btnDiscord" onclick="enviarADiscord()" class="sidebar-action-btn discord-btn" style="display:none;">
                    <span>💬</span> Discord Webhook
                </button>
                <div class="sidebar-action-row">
                    <button id="githubBtn" class="sidebar-action-btn github-btn" title="Go to GitHub repository">
                        <span>⭐</span> GitHub
                    </button>
                    <button id="feedbackBtn" class="sidebar-action-btn feedback-btn" title="Report a bug or suggestion">
                        <span>📝</span> Feedback
                    </button>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content" id="mainContent">
            <div id="contentArea">
                <div class="content-placeholder">
                    <div class="placeholder-icon">🦆</div>
                    <p>Select a fight and a player to view the analysis</p>
                </div>
            </div>
        </main>

        <!-- RIGHT SIDEBAR — PLAYERS -->
        <aside class="sidebar sidebar-right" id="sidebarRight">
            <div class="sidebar-section">
                <div class="sidebar-section-title">PLAYERS</div>
                <div id="playersList" class="sidebar-list"></div>
            </div>
        </aside>

    </div>

    <!-- ==================== GEAR INSPECTOR MODAL ==================== -->
    <div class="overlay" id="gearOverlay">
        <div class="settings-modal paperdoll-card" style="width: 1000px; max-width: 95vw;">
            <div class="settings-header">
                <h3 id="gearModalTitle">👕 Gear Inspector</h3>
                <button class="close-btn" onclick="closeGearModal()">×</button>
            </div>
            <div class="settings-body gear-modal-body" style="padding: 1.5rem; background: #0a0a0a;">
                <div id="gearModalContent"></div>
            </div>
        </div>
    </div>

    <!-- ==================== DISCORD WEBHOOK MODAL ==================== -->
    <div class="overlay" id="discordOverlay">
        <div class="discord-modal">
            <div class="discord-modal-header">
                <h3>💬 Discord Webhooks</h3>
                <button class="discord-close-btn" onclick="closeDiscordModal()">×</button>
            </div>
            <div class="discord-modal-body">
                <div class="webhook-profiles-section">
                    <div class="webhook-section-title">
                        <span>📋 Saved Profiles</span>
                        <button class="webhook-add-btn" onclick="showWebhookForm()">+ Add New</button>
                    </div>
                    <div id="webhookProfilesList" class="webhook-profiles-list"></div>
                </div>
                <div id="webhookForm" class="webhook-form" style="display:none;">
                    <div class="webhook-form-title" id="webhookFormTitle">➕ New Profile</div>
                    <div class="webhook-form-fields">
                        <div class="webhook-form-group">
                            <label class="discord-label">Profile Name</label>
                            <input type="text" id="webhookNameInput" class="discord-input"
                                placeholder="e.g. Raid Officers, #logs...">
                        </div>
                        <div class="webhook-form-group">
                            <label class="discord-label">Webhook URL</label>
                            <input type="text" id="discordWebhookInput" class="discord-input"
                                placeholder="https://discord.com/api/webhooks/...">
                        </div>
                    </div>
                    <div class="webhook-form-actions">
                        <button class="discord-cancel-btn" onclick="hideWebhookForm()">← Back</button>
                        <button class="discord-save-profile-btn" onclick="saveWebhookProfile()">💾 Save
                            Profile</button>
                    </div>
                </div>
            </div>
            <div class="discord-modal-footer">
                <button class="discord-cancel-btn" onclick="closeDiscordModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- Buttons moved to sidebar and footer -->

    <!-- ==================== SCRIPTS ==================== -->
    <script src="/js/data.js"></script>
    <script src="/js/script.js?v=1.2.1"></script>
    <script>
        document.getElementById('feedbackBtn').addEventListener('click', function () {
            window.open('https://github.com/patitokun03-spec/TBC-Duck-Analyzer/issues/new?labels=feedback&template=bug_report.md', '_blank');
        });
        document.getElementById('githubBtn').addEventListener('click', function () {
            window.open('https://github.com/patitokun03-spec/TBC-Duck-Analyzer', '_blank');
        });
        document.getElementById('landingFeedbackBtn').addEventListener('click', function (e) {
            e.preventDefault();
            window.open('https://github.com/patitokun03-spec/TBC-Duck-Analyzer/issues/new?labels=feedback&template=bug_report.md', '_blank');
        });
        document.getElementById('landingGithubBtn').addEventListener('click', function (e) {
            e.preventDefault();
            window.open('https://github.com/patitokun03-spec/TBC-Duck-Analyzer', '_blank');
        });
    </script>

</body>

</html>
